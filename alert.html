<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: transparent !important;
            margin: 0;
            padding: 15px;
            overflow: hidden;
            align-items: stretch;
        }
        body::before { display: none; }
        .glass-panel { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            -webkit-app-region: drag; 
            background: rgba(10, 10, 12, 0.96) !important; /* Đổ nền tối đậm để tương phản */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            border-radius: 15px;
        }
        .no-drag { -webkit-app-region: no-drag; }
        .primary-btn { margin-top: auto; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="logo-container" style="margin-bottom: 10px;">
            <img src="assets/icon.png" alt="Logo" class="app-logo" style="width: 50px; height: 50px;">
        </div>
        <h2 id="title" style="color: var(--primary);">Thông báo</h2>
        <p id="msg" style="margin: 15px 0; font-size: 1.1em; line-height: 1.5;"></p>
        <div class="modal-footer no-drag">
            <button class="primary-btn" style="width: 100%;" onclick="const { ipcRenderer } = require('electron'); ipcRenderer.send('close-popup');">Đã hiểu</button>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('title').innerText = urlParams.get('title') || 'Thông báo';
        document.getElementById('msg').innerText = urlParams.get('msg') || '';
    </script>
</body>
</html>
